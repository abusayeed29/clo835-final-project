name: CLO835 Deployment Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_APP: clo835-flask-app
  ECR_REPOSITORY_DB: clo835-mysql

jobs:

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # 🔥 FIXED AWS AUTH (with session token)
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build Flask App Image
      run: |
        docker build -t $ECR_REPOSITORY_APP:latest ./webapp-mysql/app

    - name: Tag Flask Image
      run: |
        docker tag $ECR_REPOSITORY_APP:latest \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/$ECR_REPOSITORY_APP:latest

    - name: Push Flask Image
      run: |
        docker push \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/$ECR_REPOSITORY_APP:latest

    - name: Build MySQL Image
      run: |
        docker build -t $ECR_REPOSITORY_DB:latest ./webapp-mysql/mysql

    - name: Tag MySQL Image
      run: |
        docker tag $ECR_REPOSITORY_DB:latest \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/$ECR_REPOSITORY_DB:latest

    - name: Push MySQL Image
      run: |
        docker push \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/$ECR_REPOSITORY_DB:latest